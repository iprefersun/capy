<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capy — Game Breakdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,900;1,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber: #BA7517;
      --amber-light: #FAEEDA;
      --amber-dark: #633806;
      --green: #1D9E75;
      --green-light: #EAF3DE;
      --green-dark: #27500A;
      --red: #D85A30;
      --red-light: #FAECE7;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-hint: #9b9b9b;
      --border: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.15);
      --surface: #fff;
      --surface-2: #f7f6f3;
      --radius: 12px;
      --radius-sm: 8px;
    }
    body { font-family: 'Inter', sans-serif; color: var(--text); background: #f5f4f1; line-height: 1.5; }

    nav { background: #fff; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; max-width: 1100px; margin: 0 auto; }
    .nav-logo { display: flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-size: 20px; font-weight: 900; color: var(--text); text-decoration: none; }
    .logo-mark { width: 30px; height: 30px; background: var(--amber-light); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .btn-small { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 6px; border: none; background: var(--amber); color: #fff; cursor: pointer; text-decoration: none; }
    .back-link { font-size: 13px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .back-link:hover { color: var(--text); }

    .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    /* HERO MATCHUP */
    .matchup-hero { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 2rem; margin-bottom: 1.25rem; text-align: center; }
    .matchup-sport { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-hint); margin-bottom: 12px; }
    .matchup-teams { display: flex; align-items: center; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 12px; }
    .team-name { font-family: 'Fraunces', serif; font-size: clamp(22px, 4vw, 36px); font-weight: 900; color: var(--text); }
    .matchup-vs { font-size: 14px; color: var(--text-hint); font-weight: 500; }
    .matchup-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-muted); }
    .matchup-record { font-size: 12px; color: var(--text-hint); margin-top: 4px; }

    /* ODDS STRIP */
    .odds-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
    .odds-strip-card { background: var(--surface); border-radius: var(--radius-sm); border: 0.5px solid var(--border); padding: 10px 14px; }
    .odds-strip-book { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-hint); margin-bottom: 4px; }
    .odds-strip-line { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
    .odds-strip-card.best-book { border-color: var(--green); background: var(--green-light); }
    .odds-strip-card.best-book .odds-strip-line { color: var(--green-dark); font-weight: 700; }

    /* SECTION */
    .section { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 1.5rem; margin-bottom: 1.25rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 900; color: var(--text); }
    .section-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .badge-free { background: var(--green-light); color: var(--green-dark); }
    .badge-pro { background: var(--amber-light); color: var(--amber-dark); }

    /* TEAM STATS */
    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .team-card { background: var(--surface-2); border-radius: var(--radius-sm); padding: 1rem; }
    .team-card-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-name { font-size: 12px; color: var(--text-muted); }
    .stat-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
    .stat-val.highlight { color: var(--green); font-weight: 700; }

    /* H2H */
    .h2h-list { display: flex; flex-direction: column; gap: 8px; }
    .h2h-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-sm); flex-wrap: wrap; gap: 8px; }
    .h2h-date { font-size: 11px; color: var(--text-hint); font-family: 'DM Mono', monospace; }
    .h2h-teams { font-size: 13px; font-weight: 600; color: var(--text); }
    .h2h-score { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text); }
    .h2h-winner { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .win { background: var(--green-light); color: var(--green-dark); }
    .loss { background: var(--red-light); color: var(--red); }

    /* PLAYERS */
    .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .player-list { display: flex; flex-direction: column; gap: 6px; }
    .player-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--surface-2); border-radius: var(--radius-sm); }
    .player-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .player-pos { font-size: 10px; color: var(--text-hint); margin-top: 1px; }
    .player-stats { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); text-align: right; }

    /* INJURY */
    .injury-list { display: flex; flex-direction: column; gap: 8px; }
    .injury-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-sm); flex-wrap: wrap; gap: 8px; }
    .injury-player { font-size: 13px; font-weight: 600; color: var(--text); }
    .injury-team { font-size: 11px; color: var(--text-hint); }
    .injury-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .status-out { background: var(--red-light); color: var(--red); }
    .status-questionable { background: var(--amber-light); color: var(--amber-dark); }
    .status-probable { background: var(--green-light); color: var(--green-dark); }

    /* PLAYER PROPS */
    .props-market-group { margin-bottom: 1rem; }
    .props-market-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1.5px solid var(--border-mid); margin-bottom: 6px; cursor: pointer; user-select: none; }
    .props-market-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); }
    .props-market-toggle { font-size: 11px; color: var(--text-hint); }
    .props-table { width: 100%; }
    .props-th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-hint); padding: 4px 6px; text-align: left; }
    .props-tr { border-bottom: 0.5px solid var(--border); }
    .props-tr:last-child { border-bottom: none; }
    .props-td { padding: 8px 6px; font-size: 12px; color: var(--text); vertical-align: middle; }
    .props-player { font-weight: 600; }
    .props-line { font-family: 'DM Mono', monospace; color: var(--text-muted); }
    .props-odds-val { font-family: 'DM Mono', monospace; font-weight: 700; }
    .props-odds-val.best-odds { color: var(--green-dark); background: var(--green-light); padding: 2px 6px; border-radius: 6px; }
    .props-book-name { font-size: 10px; color: var(--text-hint); }
    .ou-toggle { display: flex; border-radius: 6px; overflow: hidden; border: 0.5px solid var(--border-mid); }
    .ou-btn { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; padding: 3px 8px; background: var(--surface-2); color: var(--text-muted); border: none; cursor: pointer; transition: background 0.12s; }
    .ou-btn.active { background: var(--green); color: #fff; }
    .add-prop-btn { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 10px; background: var(--amber-light); color: var(--amber-dark); border: none; border-radius: 6px; cursor: pointer; transition: background 0.12s; }
    .add-prop-btn:hover { background: var(--amber); color: #fff; }
    .add-prop-btn.added { background: var(--green-light); color: var(--green-dark); }
    .props-empty { text-align: center; padding: 1.5rem; font-size: 13px; color: var(--text-hint); }
    .props-skeleton-row { background: var(--surface-2); border-radius: 6px; height: 36px; margin-bottom: 6px; animation: pulse-sk 1.4s ease infinite; }
    @keyframes pulse-sk { 0%,100%{opacity:1} 50%{opacity:0.45} }
    .prop-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #0f1117; color: #eeedf0; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 8px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .prop-toast.show { opacity: 1; }

    /* PRO GATE */
    .pro-gate { background: var(--surface-2); border-radius: var(--radius-sm); padding: 2rem; text-align: center; border: 1.5px dashed var(--border-mid); }
    .pro-gate-icon { font-size: 32px; margin-bottom: 10px; display: block; }
    .pro-gate-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .pro-gate-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; }

    /* LOADING */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--amber-light); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-muted); }

    .dash-footer { text-align: center; padding: 1.5rem; font-size: 11px; color: var(--text-hint); margin-top: 1rem; }

    @media (max-width: 600px) {
      .teams-grid, .players-grid { grid-template-columns: 1fr; }
      .matchup-teams { gap: 1rem; }
      .main { padding: 1rem; }
    }

    /* ── DARK MODE ────────────────────────────────────────── */
    body, nav, .matchup-hero, .section, .odds-strip-card { transition: background-color 0.2s, color 0.2s, border-color 0.2s; }

    [data-theme="dark"] {
      --amber: #e8991e;
      --amber-light: #2d1f08;
      --amber-dark: #f5c87a;
      --green: #22c48a;
      --green-light: #0a2118;
      --green-dark: #7dd9b4;
      --red: #F07050;
      --red-light: #2a1009;
      --text: #eeedf0;
      --text-muted: #9898a4;
      --text-hint: #505058;
      --border: rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.13);
      --surface: #1a1d27;
      --surface-2: #13151f;
    }
    [data-theme="dark"] body { background: #0f1117; }
    [data-theme="dark"] nav { background: #161920; }
    [data-theme="dark"] .odds-strip-card.best-book { background: #0a2118; border-color: #22c48a; }

    .theme-toggle-btn { background: var(--surface-2); border: 0.5px solid var(--border-mid); border-radius: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: background 0.15s; flex-shrink: 0; padding: 0; line-height: 1; }
    .theme-toggle-btn:hover { opacity: 0.8; }
  </style>
  <script>(function(){var t=localStorage.getItem('capy_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="logo-mark">🐾</div>
      Capy
    </a>
    <div class="nav-right">
      <a href="/odds" class="back-link">← Back to odds</a>
      <a href="/parlay.html" style="font-size:13px;color:var(--text-muted);text-decoration:none;padding:5px 8px;border-radius:6px;">Parlay</a>
      <a href="/#signup" class="btn-small">Go Sharp — $10/mo</a>
      <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode"><span id="theme-icon">☀️</span></button>
    </div>
  </div>
</nav>

<div class="main" id="main-content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading game breakdown...</div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const homeTeam = params.get('home');
  const awayTeam = params.get('away');
  const sport = params.get('sport') || 'basketball_nba';
  const commenceTime = params.get('time');
  const gameId = params.get('id');

  const SPORT_MAP = {
    basketball_nba: { espn: 'basketball/nba', label: 'NBA', abbr: 'nba' },
    americanfootball_nfl: { espn: 'football/nfl', label: 'NFL', abbr: 'nfl' },
    baseball_mlb: { espn: 'baseball/mlb', label: 'MLB', abbr: 'mlb' },
    icehockey_nhl: { espn: 'hockey/nhl', label: 'NHL', abbr: 'nhl' }
  };

  const sportInfo = SPORT_MAP[sport] || SPORT_MAP.basketball_nba;

  async function loadGame() {
    const [oddsData, espnData] = await Promise.all([
      fetchOdds(),
      fetchESPN()
    ]);
    render(oddsData, espnData);
    loadProps();
  }

  async function fetchOdds() {
    try {
      const res = await fetch(`/api/odds?sport=${sport}`);
      const data = await res.json();
      // Handle both new { usOdds, pinnacleOdds } format and legacy array fallback
      const games = Array.isArray(data.usOdds) ? data.usOdds : (Array.isArray(data) ? data : []);
      return games.find(g => g.home_team === homeTeam && g.away_team === awayTeam) || null;
    } catch(e) { return null; }
  }

  async function fetchESPN() {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportInfo.espn}/scoreboard`);
      const data = await res.json();
      return data;
    } catch(e) { return null; }
  }

  async function fetchTeamStats(teamName) {
    try {
      const searchRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportInfo.espn}/teams?limit=50`);
      const searchData = await searchRes.json();
      const team = searchData.sports?.[0]?.leagues?.[0]?.teams?.find(t => 
        t.team.displayName.toLowerCase().includes(teamName.split(' ').pop().toLowerCase()) ||
        teamName.toLowerCase().includes(t.team.displayName.toLowerCase().split(' ').pop())
      );
      if (!team) return null;
      const teamId = team.team.id;
      const statsRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportInfo.espn}/teams/${teamId}`);
      return await statsRes.json();
    } catch(e) { return null; }
  }

  async function fetchH2H(homeTeamName, awayTeamName) {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportInfo.espn}/scoreboard?limit=100`);
      const data = await res.json();
      return data?.events?.filter(e => {
        const comps = e.competitions?.[0]?.competitors || [];
        const names = comps.map(c => c.team.displayName);
        return names.some(n => homeTeamName.includes(n.split(' ').pop()) || n.includes(homeTeamName.split(' ').pop())) &&
               names.some(n => awayTeamName.includes(n.split(' ').pop()) || n.includes(awayTeamName.split(' ').pop()));
      }).slice(0, 5) || [];
    } catch(e) { return []; }
  }

  function render(oddsGame, espnData) {
    const time = commenceTime ? new Date(commenceTime).toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    }) : 'Today';

    const books = oddsGame?.bookmakers || [];
    const bestBook = findBestBook(books, homeTeam);

    document.title = `${awayTeam} @ ${homeTeam} — Capy`;

    document.getElementById('main-content').innerHTML = `
      <div class="matchup-hero">
        <div class="matchup-sport">${sportInfo.label} · ${time}</div>
        <div class="matchup-teams">
          <div>
            <div class="team-name">${awayTeam}</div>
            <div class="matchup-record" id="away-record">Loading...</div>
          </div>
          <div class="matchup-vs">@</div>
          <div>
            <div class="team-name">${homeTeam}</div>
            <div class="matchup-record" id="home-record">Loading...</div>
          </div>
        </div>
        <div class="matchup-time">Tip-off at ${commenceTime ? new Date(commenceTime).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}) : 'TBD'}</div>
      </div>

      ${renderOddsStrip(books)}

      <div class="section">
        <div class="section-header">
          <div class="section-title">Team stats this season</div>
          <span class="section-badge badge-free">Casual</span>
        </div>
        <div class="teams-grid" id="team-stats">
          <div class="team-card">
            <div class="team-card-name">${awayTeam}</div>
            <div class="loading-text" style="font-size:12px;color:var(--text-hint);">Loading stats...</div>
          </div>
          <div class="team-card">
            <div class="team-card-name">${homeTeam}</div>
            <div class="loading-text" style="font-size:12px;color:var(--text-hint);">Loading stats...</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Head to head history</div>
          <span class="section-badge badge-free">Casual</span>
        </div>
        <div class="h2h-list" id="h2h-list">
          <div class="loading-text" style="font-size:12px;color:var(--text-hint);">Loading matchup history...</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Top performers</div>
          <span class="section-badge badge-free">Casual</span>
        </div>
        <div class="players-grid" id="players-grid">
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">${awayTeam}</div>
            <div class="player-list" id="away-players"><div class="loading-text" style="font-size:12px;color:var(--text-hint);">Loading...</div></div>
          </div>
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">${homeTeam}</div>
            <div class="player-list" id="home-players"><div class="loading-text" style="font-size:12px;color:var(--text-hint);">Loading...</div></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Injury report</div>
          <span class="section-badge badge-free">Casual</span>
        </div>
        <div class="injury-list" id="injury-list">
          <div class="loading-text" style="font-size:12px;color:var(--text-hint);">Loading injury report...</div>
        </div>
      </div>

      <div class="section" id="props-section">
        <div class="section-header">
          <div class="section-title">🎯 Player Props — Best Available Lines</div>
          <span class="section-badge badge-free">Casual</span>
        </div>
        <div id="props-container">
          ${['basketball_nba','americanfootball_nfl','baseball_mlb','icehockey_nhl'].includes(sport) ? `
            <div class="props-skeleton-row"></div>
            <div class="props-skeleton-row"></div>
            <div class="props-skeleton-row"></div>` : '<div class="props-empty">Props coming soon for this sport</div>'}
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Line movement</div>
          <span class="section-badge badge-pro">Sharp</span>
        </div>
        <div class="pro-gate">
          <span class="pro-gate-icon">📈</span>
          <div class="pro-gate-title">See how the line has moved</div>
          <div class="pro-gate-sub">Track opening lines, sharp money moves, and public betting percentages. Know when to jump on a line before it moves.</div>
          <a href="/#signup" class="btn-small">Unlock for $10/mo</a>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">AI matchup breakdown</div>
          <span class="section-badge badge-pro">Sharp</span>
        </div>
        <div class="pro-gate">
          <span class="pro-gate-icon">🦫</span>
          <div class="pro-gate-title">Let Capy break it down for you</div>
          <div class="pro-gate-sub">AI-powered analysis of this specific matchup — key advantages, historical trends, weather, travel fatigue, and a recommended side.</div>
          <a href="/#signup" class="btn-small">Unlock for $10/mo</a>
        </div>
      </div>

      <div class="dash-footer">
        Must be 21+ to bet. Gambling problem? Call 1-800-GAMBLER. &nbsp;·&nbsp; <a href="/odds" style="color:var(--amber);">← Back to all odds</a>
      </div>
    `;

    loadTeamData();
    loadH2H();
  }

  function renderOddsStrip(books) {
    if (!books.length) return '';
    const bestML = findBestML(books, homeTeam);
    return `
      <div class="odds-strip">
        ${books.slice(0, 5).map(book => {
          const h2h = book.markets?.find(m => m.key === 'h2h');
          const homeOdds = h2h?.outcomes?.find(o => o.name === homeTeam);
          const awayOdds = h2h?.outcomes?.find(o => o.name === awayTeam);
          const spread = book.markets?.find(m => m.key === 'spreads');
          const homeSpread = spread?.outcomes?.find(o => o.name === homeTeam);
          if (!homeOdds && !homeSpread) return '';
          const isBest = book.title === bestML;
          return `
            <div class="odds-strip-card ${isBest ? 'best-book' : ''}">
              <div class="odds-strip-book">${book.title}${isBest ? ' ★ Best' : ''}</div>
              ${homeOdds ? `<div class="odds-strip-line">${homeTeam.split(' ').pop()} ML: ${homeOdds.price > 0 ? '+' : ''}${homeOdds.price}</div>` : ''}
              ${homeSpread ? `<div class="odds-strip-line">Spread: ${homeSpread.point > 0 ? '+' : ''}${homeSpread.point}</div>` : ''}
            </div>`;
        }).join('')}
      </div>`;
  }

  function findBestML(books, team) {
    let best = null, bestPrice = -99999;
    books.forEach(book => {
      const h2h = book.markets?.find(m => m.key === 'h2h');
      const outcome = h2h?.outcomes?.find(o => o.name === team);
      if (outcome && outcome.price > bestPrice) {
        bestPrice = outcome.price;
        best = book.title;
      }
    });
    return best;
  }

  function findBestBook(books, team) {
    return findBestML(books, team);
  }

  async function loadTeamData() {
    const [awayData, homeData] = await Promise.all([
      fetchTeamStats(awayTeam),
      fetchTeamStats(homeTeam)
    ]);

    const awayStats = extractStats(awayData, awayTeam);
    const homeStats = extractStats(homeData, homeTeam);

    if (document.getElementById('away-record')) {
      document.getElementById('away-record').textContent = awayStats.record;
      document.getElementById('home-record').textContent = homeStats.record;
    }

    const statsEl = document.getElementById('team-stats');
    if (statsEl) {
      statsEl.innerHTML = `
        ${renderTeamCard(awayTeam, awayStats)}
        ${renderTeamCard(homeTeam, homeStats)}
      `;
    }

    const awayPlayersEl = document.getElementById('away-players');
    const homePlayersEl = document.getElementById('home-players');
    if (awayPlayersEl) awayPlayersEl.innerHTML = renderPlayers(awayStats.athletes);
    if (homePlayersEl) homePlayersEl.innerHTML = renderPlayers(homeStats.athletes);

    const injuryEl = document.getElementById('injury-list');
    if (injuryEl) {
      const injuries = [...(awayStats.injuries || []), ...(homeStats.injuries || [])];
      injuryEl.innerHTML = injuries.length ? injuries.map(inj => `
        <div class="injury-item">
          <div>
            <div class="injury-player">${inj.name}</div>
            <div class="injury-team">${inj.team}</div>
          </div>
          <span class="injury-status status-${inj.status.toLowerCase().replace(' ', '-')}">${inj.status}</span>
        </div>
      `).join('') : '<div style="font-size:13px;color:var(--text-hint);text-align:center;padding:1rem;">No injuries reported for this game</div>';
    }
  }

  function extractStats(data, teamName) {
    const fallback = { record: 'N/A', ppg: '—', oppg: '—', athletes: [], injuries: [] };
    if (!data) return fallback;
    try {
      const team = data.team;
      const record = team?.record?.items?.[0]?.summary || 'N/A';
      const stats = team?.seasonSummary || {};
      const athletes = team?.athletes?.slice(0, 5).map(a => ({
        name: a.displayName,
        pos: a.position?.abbreviation || '',
        stats: a.statistics?.[0]?.displayValue || '—'
      })) || [];
      const injuries = team?.injuries?.map(inj => ({
        name: inj.athlete?.displayName || 'Unknown',
        team: teamName,
        status: inj.status || 'Questionable'
      })) || [];
      return { record, ppg: '—', oppg: '—', athletes, injuries };
    } catch(e) { return fallback; }
  }

  function renderTeamCard(name, stats) {
    return `
      <div class="team-card">
        <div class="team-card-name">${name}</div>
        <div class="stat-row"><span class="stat-name">Record</span><span class="stat-val highlight">${stats.record}</span></div>
        <div class="stat-row"><span class="stat-name">Points per game</span><span class="stat-val">${stats.ppg}</span></div>
        <div class="stat-row"><span class="stat-name">Opp points per game</span><span class="stat-val">${stats.oppg}</span></div>
      </div>`;
  }

  function renderPlayers(athletes) {
    if (!athletes || !athletes.length) return '<div style="font-size:12px;color:var(--text-hint);">No player data available</div>';
    return athletes.map(a => `
      <div class="player-item">
        <div>
          <div class="player-name">${a.name}</div>
          <div class="player-pos">${a.pos}</div>
        </div>
        <div class="player-stats">${a.stats}</div>
      </div>
    `).join('');
  }

  async function loadH2H() {
    const games = await fetchH2H(homeTeam, awayTeam);
    const el = document.getElementById('h2h-list');
    if (!el) return;
    if (!games.length) {
      el.innerHTML = '<div style="font-size:13px;color:var(--text-hint);text-align:center;padding:1rem;">No recent head to head matchups found</div>';
      return;
    }
    el.innerHTML = games.map(event => {
      const comp = event.competitions?.[0];
      const comps = comp?.competitors || [];
      const home = comps.find(c => c.homeAway === 'home');
      const away = comps.find(c => c.homeAway === 'away');
      const date = new Date(event.date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      const state = comp?.status?.type?.state || event.status?.type?.state || 'post';
      const isCompleted = comp?.status?.type?.completed ?? (state === 'post');
      const isLive = state === 'in';

      if (!isCompleted && !isLive) {
        // Game hasn't started — show tip-off time instead of score
        const tipoff = new Date(event.date).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
        return `
          <div class="h2h-item">
            <div class="h2h-date">${date}</div>
            <div class="h2h-teams">${away?.team.displayName} @ ${home?.team.displayName}</div>
            <div class="h2h-score" style="font-size:12px;color:var(--text-hint);">Upcoming · ${tipoff}</div>
          </div>`;
      }

      const homeScore = parseInt(home?.score);
      const awayScore = parseInt(away?.score);
      const homeWon = homeScore > awayScore;
      const ourTeamIsHome = home?.team.displayName?.includes(homeTeam.split(' ').pop());
      const weWon = ourTeamIsHome ? homeWon : !homeWon;
      return `
        <div class="h2h-item">
          <div class="h2h-date">${date}</div>
          <div class="h2h-teams">${away?.team.displayName} @ ${home?.team.displayName}</div>
          <div class="h2h-score">${awayScore} - ${homeScore}${isLive ? ' <span style="color:var(--green);font-size:10px;font-weight:700;">LIVE</span>' : ''}</div>
          <span class="h2h-winner ${weWon ? 'win' : 'loss'}">${homeTeam.split(' ').pop()} ${weWon ? 'W' : 'L'}</span>
        </div>`;
    }).join('');
  }

  // ── Theme toggle ──────────────────────────────────────────────────────
  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('capy_theme', next);
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
  }
  (function() {
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  })();

  // ── Player Props ──────────────────────────────────────────────────────
  const PROPS_CACHE_TTL_GAME = 5 * 60 * 1000;
  let propsCache = {};
  let propSideState = {}; // keyed by propKey, value: 'over' | 'under'

  const MARKET_LABELS = {
    player_points: 'Points', player_rebounds: 'Rebounds', player_assists: 'Assists',
    player_threes: '3-Pointers', player_blocks: 'Blocks', player_steals: 'Steals',
    player_pass_tds: 'Pass TDs', player_pass_yards: 'Pass Yards', player_rush_yards: 'Rush Yards',
    player_reception_yards: 'Rec Yards', player_receptions: 'Receptions',
    player_hits: 'Hits', player_home_runs: 'Home Runs', player_rbis: 'RBIs',
    player_strikeouts_thrown: 'Strikeouts', player_goals: 'Goals',
  };

  async function loadProps() {
    if (!['basketball_nba','americanfootball_nfl','baseball_mlb','icehockey_nhl'].includes(sport)) return;
    if (!gameId) { document.getElementById('props-container').innerHTML = '<div class="props-empty">Props not available — game ID missing.</div>'; return; }
    try {
      const cached = propsCache[gameId];
      let data;
      if (cached && Date.now() - cached.ts < PROPS_CACHE_TTL_GAME) {
        data = cached.data;
      } else {
        const res = await fetch(`/api/props?sport=${sport}&eventId=${gameId}`);
        data = await res.json();
        if (!res.ok) throw new Error(data.error || 'API error');
        propsCache[gameId] = { data, ts: Date.now() };
        const remaining = res.headers.get ? null : null; // handled server-side
      }
      renderProps(parsePropsData(data));
    } catch (e) {
      document.getElementById('props-container').innerHTML = '<div class="props-empty">Props not available for this game yet — check back closer to tip-off.</div>';
    }
  }

  function parsePropsData(apiData) {
    if (!apiData?.bookmakers?.length) return {};
    const propMap = {};
    apiData.bookmakers.forEach(book => {
      book.markets?.forEach(mkt => {
        const marketLabel = MARKET_LABELS[mkt.key] || mkt.key;
        mkt.outcomes?.forEach(o => {
          const isOver = (o.description || '').toLowerCase() === 'over';
          const isUnder = (o.description || '').toLowerCase() === 'under';
          if (!isOver && !isUnder) return;
          const key = `${o.name}|${mkt.key}|${o.point}`;
          if (!propMap[key]) propMap[key] = { player: o.name, market: marketLabel, marketKey: mkt.key, line: o.point, over: null, under: null, overBook: null, underBook: null };
          if (isOver && (propMap[key].over === null || o.price > propMap[key].over)) { propMap[key].over = o.price; propMap[key].overBook = book.title; }
          if (isUnder && (propMap[key].under === null || o.price > propMap[key].under)) { propMap[key].under = o.price; propMap[key].underBook = book.title; }
        });
      });
    });
    // Group by market
    const grouped = {};
    Object.values(propMap).filter(p => p.over !== null || p.under !== null).forEach(p => {
      if (!grouped[p.market]) grouped[p.market] = [];
      grouped[p.market].push(p);
    });
    return grouped;
  }

  function renderProps(grouped) {
    const container = document.getElementById('props-container');
    if (!container) return;
    const markets = Object.keys(grouped);
    if (!markets.length) {
      container.innerHTML = '<div class="props-empty">Props not available for this game yet — check back closer to tip-off.</div>';
      return;
    }
    const fmtOdds = o => o == null ? '—' : (o > 0 ? `+${o}` : `${o}`);
    container.innerHTML = markets.map(mkt => {
      const props = grouped[mkt].sort((a, b) => b.line - a.line);
      return `<div class="props-market-group">
        <div class="props-market-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none';this.querySelector('.props-market-toggle').textContent=this.nextElementSibling.style.display===''?'▼':'▶'">
          <span class="props-market-label">${mkt}</span>
          <span class="props-market-toggle">▼</span>
        </div>
        <div>
          <table class="props-table">
            <thead><tr>
              <th class="props-th">Player</th>
              <th class="props-th">Line</th>
              <th class="props-th">Best Over</th>
              <th class="props-th">Best Under</th>
              <th class="props-th">Side</th>
              <th class="props-th">Add</th>
            </tr></thead>
            <tbody>
              ${props.map(p => {
                const pk = `${p.player}|${p.marketKey}|${p.line}`;
                const side = propSideState[pk] || 'over';
                return `<tr class="props-tr">
                  <td class="props-td props-player">${p.player}</td>
                  <td class="props-td props-line">${p.line}</td>
                  <td class="props-td"><span class="props-odds-val best-odds">${fmtOdds(p.over)}</span><br><span class="props-book-name">${p.overBook || ''}</span></td>
                  <td class="props-td"><span class="props-odds-val">${fmtOdds(p.under)}</span><br><span class="props-book-name">${p.underBook || ''}</span></td>
                  <td class="props-td"><div class="ou-toggle"><button class="ou-btn${side==='over'?' active':''}" onclick="setOUSide('${pk}','over',this)">O</button><button class="ou-btn${side==='under'?' active':''}" onclick="setOUSide('${pk}','under',this)">U</button></div></td>
                  <td class="props-td"><button class="add-prop-btn" id="add-prop-${pk.replace(/[|.]/g,'-')}" onclick="addPropToParlay('${p.player}','${p.market}','${p.marketKey}',${p.line},${p.over},${p.under},'${p.overBook}','${p.underBook}','${pk}')">➕ Add</button></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }).join('');
  }

  function setOUSide(pk, side, btn) {
    propSideState[pk] = side;
    const toggle = btn.closest('.ou-toggle');
    toggle.querySelectorAll('.ou-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function addPropToParlay(player, market, marketKey, line, overOdds, underOdds, overBook, underBook, pk) {
    const side = propSideState[pk] || 'over';
    const odds = side === 'over' ? overOdds : underOdds;
    const bookName = side === 'over' ? overBook : underBook;
    if (odds == null) { showPropToast('No odds available for that side.'); return; }

    const propId = `${gameId}_prop_${pk}`;
    const leg = {
      gameId: propId,
      isProp: true,
      player, market, marketKey, line,
      propSide: side,
      side: player,
      sideType: `prop_${side}`,
      market: 'prop',
      odds: parseInt(odds),
      bookName: bookName || '—',
      homeTeam, awayTeam,
      sportKey: sport,
      commenceTime,
      otherSideOdds: null,
      propLabel: `${player} — ${side === 'over' ? 'Over' : 'Under'} ${line} ${market}`,
    };

    try {
      const legs = JSON.parse(localStorage.getItem('capy_parlay') || '[]');
      const filtered = legs.filter(l => l.gameId !== propId);
      if (filtered.length >= 10) { showPropToast('Maximum 10 legs per parlay.'); return; }
      filtered.push(leg);
      localStorage.setItem('capy_parlay', JSON.stringify(filtered));
      const btnEl = document.getElementById(`add-prop-${pk.replace(/[|.]/g,'-')}`);
      if (btnEl) { btnEl.textContent = '✓ Added'; btnEl.classList.add('added'); }
      showPropToast(`Added ${player} ${market} to parlay → <a href="/parlay.html" style="color:var(--amber)">View parlay</a>`);
    } catch(e) { showPropToast('Could not add to parlay.'); }
  }

  function showPropToast(html) {
    let toast = document.getElementById('prop-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'prop-toast';
      toast.className = 'prop-toast';
      document.body.appendChild(toast);
    }
    toast.innerHTML = html;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  if (homeTeam && awayTeam) {
    loadGame();
  } else {
    document.getElementById('main-content').innerHTML = `
      <div style="text-align:center;padding:4rem;">
        <div style="font-size:48px;margin-bottom:1rem;">🦫</div>
        <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:900;">Game not found</div>
        <a href="/odds" style="color:var(--amber);font-size:14px;">← Back to odds</a>
      </div>`;
  }
</script>

</body>
